name: TARDIS – Build html & exercices PDF

on:
  workflow_call:
    inputs:
      ict_module:
        description: "Code du module ICT (ex: I346)"
        required: true
        type: string
      sphinx_src:
        description: "Répertoire Sphinx source"
        required: false
        default: "b-UnitesEnseignement/Support"
        type: string
      sphinx_theme: 
        description: "Thème ETML (ex: etml-2025) utilisé pour la génération des pages HTML"
        required: false
        default: "etml-2025"
        type: string
      pdf_theme: # Pas encore implémenté
        description: "Thème ETML (ex: etml-2025) utilisé pour la génération des PDF"
        required: false
        default: "etml-2025"
        type: string

    secrets:
      ftp_server:
        description: "Host FTP (ex: enseignement.section-inf.ch)"
        required: true
      ftp_username:
        description: "Compte FTP"
        required: true
      ftp_password:
        description: "Mot de passe FTP"
        required: true

jobs:
  build-docs:
    runs-on: ubuntu-latest
    env:
      ICT_MODULE: ${{ inputs.ict_module }}
      SPHINX_SRC_DIR: ${{ inputs.sphinx_src }}
      SPHINX_THEME: ${{ inputs.sphinx_theme }}

    steps:
      # 1) Repo APPELANT (le cours)
      - name: Checkout cours (repo appelant)
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository }}

      # 2) Repo tardis-pipelines (pour conf.py, extensions, requirements, thèmes…)
      - name: Checkout tardis-pipelines
        uses: actions/checkout@v4
        with:
          repository: ETML-INF/tardis-pipelines
          path: tardis-pipelines
          # plus tard: ref: v0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip (requirements TARDIS)
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('tardis-pipelines/requirements.txt') }}
          restore-keys: ${{ runner.os }}-pip-

      - name: Install Python deps (TARDIS)
        run: |
          python -m pip install --upgrade pip
          pip install -r tardis-pipelines/requirements.txt

      - name: Build docs (HTML)
        run: |
          sphinx-build \
            -c tardis-pipelines \
            -b html "$SPHINX_SRC_DIR" "$SPHINX_SRC_DIR/_build/html"

      - name: Upload docs artifact (site HTML)
        uses: actions/upload-artifact@v4
        with:
          name: site-html
          path: ${{ env.SPHINX_SRC_DIR }}/_build/html/**
          if-no-files-found: error
          retention-days: 7

  build-exo-pdf:
    runs-on: ubuntu-latest
    needs: build-docs
    outputs:
      has_pdfs: ${{ steps.check-pdfs.outputs.has_pdfs }}
    env:
      ICT_MODULE: ${{ inputs.ict_module }}
      SPHINX_SRC_DIR: ${{ inputs.sphinx_src }}
      HTML_OUT_DIR: ${{ inputs.sphinx_src }}/_build/html
      PDF_OUT_DIR: ${{ inputs.sphinx_src }}/_build/exo-pdf
      PDF_THEME: ${{ inputs.pdf_theme }}
      # Chemin complet vers le thème dans tardis-pipelines
      TARDIS_THEME_ROOT: ${{ github.workspace }}/tardis-pipelines/themes/${{ inputs.theme }}

    steps:
      - name: Checkout cours (repo appelant)
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository }}

      - name: Checkout tardis-pipelines
        uses: actions/checkout@v4
        with:
          repository: ETML-INF/tardis-pipelines
          path: tardis-pipelines
          # plus tard: ref: v0

      - name: Download site HTML artifact
        uses: actions/download-artifact@v4
        with:
          name: site-html
          path: ${{ env.SPHINX_SRC_DIR }}/_build/html

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Playwright deps
        working-directory: tardis-pipelines
        run: |
          npm ci
          npx playwright install --with-deps chromium

      - name: Build exercices PDF (Playwright)
        working-directory: ${{ github.workspace }}
        run: |
          node tardis-pipelines/scripts/export_exos_pdf_playwright.mjs

      - name: Vérifier la présence de PDFs générés
        id: check-pdfs
        run: |
          if find "${PDF_OUT_DIR}" -name '*.pdf' -print -quit 2>/dev/null | grep -q .; then
            echo "has_pdfs=true" >> "$GITHUB_OUTPUT"
            echo "✅ PDFs trouvés"
          else
            echo "has_pdfs=false" >> "$GITHUB_OUTPUT"
            echo "ℹ️ Aucun PDF — déploiement des exercices ignoré"
          fi

      - name: Upload PDFs (raw)
        if: steps.check-pdfs.outputs.has_pdfs == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: exercices-pdf
          path: ${{ env.PDF_OUT_DIR }}/**
          if-no-files-found: warn
          retention-days: 7

  deploy:
    runs-on: ubuntu-latest
    needs: [build-docs, build-exo-pdf]
    env:
      ICT_MODULE: ${{ inputs.ict_module }}
    steps:
      - name: Calculer le sous-dossier de branche
        id: branch
        run: |
          REF="${{ github.ref_name }}"
          if [[ "${REF}" == "main" || "${REF}" == "master" ]]; then
            echo "prefix=" >> "$GITHUB_OUTPUT"
          else
            echo "prefix=${REF}/" >> "$GITHUB_OUTPUT"
          fi

      - name: ⬇️ Download site HTML
        uses: actions/download-artifact@v4
        with:
          name: site-html
          path: site

      - name: ⬇️ Download exercices PDF
        if: needs.build-exo-pdf.outputs.has_pdfs == 'true'
        uses: actions/download-artifact@v4
        with:
          name: exercices-pdf
          path: site-exo/exercices

      - name: Checkout tardis-pipelines (pour template index + CSS)
        uses: actions/checkout@v4
        with:
          repository: ETML-INF/tardis-pipelines
          path: tardis-pipelines
          # plus tard: ref: v0

      - name: Setup Node pour génération index
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Générer index.html + CSS pour /exercices
        if: needs.build-exo-pdf.outputs.has_pdfs == 'true'
        working-directory: ${{ github.workspace }}
        env:
          EXO_ROOT: site-exo/exercices
          SUPPORT_PDF_DIR: site-exo/support-pdf
          TARDIS_THEME_ROOT: ${{ github.workspace }}/tardis-pipelines/themes/${{ inputs.theme }}
        run: |
          node tardis-pipelines/scripts/build_exo_index.mjs

      - name: 📂 Sync cours (HTML)
        uses: ETML-INF/tardis-pipelines/.github/actions/ftp-sync@main
        with:
          local-dir:    site/
          description: 
          ictroot-dir: ${{ vars.ICT_ROOT_FOLDER }}
          ictmodule-dir: ${{ vars.ICT_MODULE }}
          custom-dir:   ${{ steps.branch.outputs.prefix }}${{ vars.FTP_DOCS_DIR }}
          state-name:   ".ftp-sync-support.json"
          log-level:    "minimal"
          timeout:      "300000"
          ftp-server:   ${{ vars.FTP_SERVER }}
          ftp-username: ${{ secrets.FTP_USERNAME }}
          ftp-password: ${{ secrets.FTP_PASSWORD }}

      - name: 📂 Sync /exercices (PDF)
        if: needs.build-exo-pdf.outputs.has_pdfs == 'true'
        uses: ETML-INF/tardis-pipelines/.github/actions/ftp-sync@main
        with:
          local-dir:    site-exo/exercices/
          ictroot-dir: ${{ vars.ICT_ROOT_FOLDER }}
          ictmodule-dir: ${{ vars.ICT_MODULE }}
          custom-dir:   ${{ steps.branch.outputs.prefix }}${{ vars.FTP_EXO_DIR }}
          state-name:   ".ftp-sync-exercices.json"
          log-level:    "minimal"
          timeout:      "300000"
          ftp-server:   ${{ vars.FTP_SERVER }}
          ftp-username: ${{ secrets.FTP_USERNAME }}
          ftp-password: ${{ secrets.FTP_PASSWORD }}
